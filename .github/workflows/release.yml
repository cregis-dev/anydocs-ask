name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.3.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @anydocs/ask
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # OIDC trusted publishing 要求 npm CLI >= 11.5.1，而 Node 22 自带 npm 10.9.x
      # 不具备 OIDC token exchange 能力 —— 这正是 0.3.1 / 0.4.0-alpha.4 连续 4 次
      # `npm publish` 返回 E404 的根因（npm 对 scoped 包用 404 而非 403 表示凭证不被接受）。
      # 升级到 latest 后 publish 才能用 GitHub 签发的 OIDC token 完成 trusted publishing。
      # 背景见 memory: project_npm_publish_oidc_404.md。
      - name: Upgrade npm for OIDC trusted publishing (needs >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${{ inputs.tag || github.ref_name }}"
          TAG="${TAG#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Dump OIDC token claims to logs before publish — pure取证，便于事后比对 npm
      # trusted publisher 配置（owner / repo / environment / workflow_ref / sub）。
      # continue-on-error 保证它本身故障不阻断真实 publish。
      # 背景见 memory: project_npm_publish_oidc_404.md。
      - name: Dump OIDC claims (forensic for npm E404 debugging)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const token = await core.getIDToken('npm:registry.npmjs.org');
              const payload = JSON.parse(
                Buffer.from(token.split('.')[1], 'base64url').toString('utf8')
              );
              const fields = [
                'sub', 'repository', 'repository_owner',
                'repository_id', 'repository_owner_id',
                'workflow', 'workflow_ref', 'job_workflow_ref',
                'environment', 'ref', 'ref_type',
                'event_name', 'actor', 'runner_environment',
              ];
              core.startGroup('OIDC claims for npm:registry.npmjs.org');
              for (const f of fields) {
                console.log(`${f.padEnd(22)} ${payload[f]}`);
              }
              core.endGroup();
            } catch (e) {
              core.warning(`Failed to dump OIDC claims: ${e.message}`);
            }

      # prerelease（含 -alpha/-beta/-rc 等 semver 预发布标识）必须发到 `next` dist-tag，
      # 否则 npm 默认把它发到 `latest`，会让 `npm install @anydocs/ask` 给所有人装上预发布版。
      # GA 版本（无预发布标识）正常进 `latest`。
      - name: Determine npm dist-tag
        id: disttag
        run: |
          VER=$(node -p "require('./package.json').version")
          if [[ "$VER" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VER to dist-tag: $([[ "$VER" == *-* ]] && echo next || echo latest)"

      - name: Publish to npm (OIDC + provenance)
        run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}
